<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D9FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0F1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141428;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bgGrad)"/>
  <!-- Border gradient effect -->
  <rect width="100" height="100" rx="20" fill="none" stroke="url(#grad)" stroke-width="3" opacity="0.6"/>
  <!-- ND Text -->
  <text x="50" y="67" font-family="'Inter', 'Arial Black', sans-serif" font-size="44" font-weight="900"
    text-anchor="middle" fill="url(#grad)" letter-spacing="-2">ND</text>
</svg>
